name: Build TWRP — OPPO F11 (CPH1911)

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    env:
      MANIFEST_URL: https://github.com/minimal-manifest-twrp/platform_manifest_twrp_aosp.git
      MANIFEST_BRANCH: twrp-12.1
      DEVICE_TREE_URL: https://github.com/${{ github.repository_owner }}/android_device_oppo_CPH1911
      DEVICE_TREE_BRANCH: main
      DEVICE_PATH: device/oppo/CPH1911
      DEVICE_NAME: CPH1911
      MAKEFILE_NAME: twrp_CPH1911
      BUILD_TARGET: recovery

    steps:
      - name: Checkout device tree
        uses: actions/checkout@v4

      - name: Free up disk space
        run: |
          sudo apt-get clean
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc
          docker system prune -f 2>/dev/null || true
          df -h

      - name: Set up build environment
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            bc bison build-essential ccache curl flex \
            g++-multilib gcc-multilib git gnupg gperf \
            imagemagick lib32ncurses-dev lib32readline-dev \
            lib32z1-dev liblz4-tool libncurses-dev \
            libsdl1.2-dev libssl-dev libxml2 libxml2-utils \
            lzop pngcrush rsync schedtool squashfs-tools \
            xsltproc zip zlib1g-dev python3 python-is-python3 \
            openjdk-11-jdk cpio

      - name: Install repo tool
        run: |
          mkdir -p ~/.bin
          curl https://storage.googleapis.com/git-repo-downloads/repo > ~/.bin/repo
          chmod a+x ~/.bin/repo
          echo "$HOME/.bin" >> $GITHUB_PATH

      - name: Configure git
        run: |
          git config --global user.name "GitHub Actions"
          git config --global user.email "actions@github.com"

      - name: Initialize TWRP repo
        run: |
          mkdir -p workspace
          cd workspace
          repo init --depth=1 \
            -u ${{ env.MANIFEST_URL }} \
            -b ${{ env.MANIFEST_BRANCH }}

      - name: Sync TWRP source
        run: |
          cd workspace
          repo sync -c -j$(nproc --all) \
            --force-sync --no-clone-bundle --no-tags \
            --optimized-fetch --prune

      - name: Clone device tree
        run: |
          cd workspace
          mkdir -p device/oppo
          git clone ${{ env.DEVICE_TREE_URL }} \
            -b ${{ env.DEVICE_TREE_BRANCH }} \
            device/oppo/CPH1911

      - name: Build TWRP recovery
        run: |
          cd workspace
          export ALLOW_MISSING_DEPENDENCIES=true
          source build/envsetup.sh
          lunch ${{ env.MAKEFILE_NAME }}-eng
          mka recoveryimage -j$(nproc --all)

      - name: Get image info
        run: |
          ls -lh workspace/out/target/product/${{ env.DEVICE_NAME }}/recovery.img
          file workspace/out/target/product/${{ env.DEVICE_NAME }}/recovery.img

      - name: Upload recovery.img
        uses: actions/upload-artifact@v4
        with:
          name: TWRP-CPH1911
          path: workspace/out/target/product/${{ env.DEVICE_NAME }}/recovery.img
          retention-days: 7
